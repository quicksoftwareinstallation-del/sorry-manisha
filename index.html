<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Manisha ❤️</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #ff758c, #ff7eb3);
        text-align: center;
        color: white;
        overflow: hidden;
    }

    h1 {
        margin-top: 40px;
        font-size: 40px;
    }

    p {
        font-size: 20px;
    }

    .container {
        margin-top: 30px;
    }

    img {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid white;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .buttons {
        margin-top: 30px;
    }

    button {
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    .yes {
        background: #28a745;
        color: white;
    }

    .yes:hover {
        transform: scale(1.1);
    }

    .no {
        background: #dc3545;
        color: white;
        position: absolute;
    }
</style>
</head>
<body>

<h1>Manisha ❤️ I’m Sorry</h1>

<div class="container">
    <!-- Replace with her photo -->
    <img src="manisha.jpg" alt="Manisha">

    <p>
        I know I made a mistake... 😔<br>
        Please forgive me ❤️<br>
        You mean everything to me 💕
    </p>

    <div class="buttons">
        <button class="yes" onclick="forgive()">Yes, I forgive you ❤️</button>
        <button class="no" id="noBtn">No 😡</button>
    </div>

    <!-- Local Audio -->
    <audio id="song" src="song.mp3"></audio>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    // Move "No" button randomly
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function forgive() {
        const audio = document.getElementById("song");
        audio.play();

        alert("I love you Manisha ❤️🥺");
    }
</script>

</body>
</html>
