<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Manisha ❤️</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Canvas Background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Glass Effect Card */
.container {
    position: relative;
    z-index: 1;
    margin: 40px auto;
    padding: 25px;
    width: 90%;
    max-width: 350px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* Image */
img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    margin-bottom: 10px;
}

/* Text */
h1 { font-size: 24px; margin-bottom: 10px; }
p { font-size: 15px; line-height: 1.5; }

/* Buttons */
.buttons {
    margin-top: 20px;
}

button {
    padding: 12px 18px;
    border-radius: 25px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    margin: 8px;
    transition: 0.2s;
}

.yes {
    background: #28a745;
    color: white;
}

.yes:active {
    transform: scale(0.95);
}

.no {
    background: #dc3545;
    color: white;
    position: absolute;
}

/* Mobile */
@media(max-width: 500px){
    .container { margin-top: 30px; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">
    <img src="manisha.jpg">

    <h1>Manisha ❤️ I’m Sorry</h1>

    <p>
        Manisha, I know I hurt you with my words… and I regret it deeply.... 😔<br>
        You mean everything to me, and I never want to lose you.🥰 <br>
        Please forgive me ❤️ 💕
    </p>

    <div class="buttons">
        <button class="yes" onclick="forgive()">Yes, I forgive you ❤️</button>
        <button class="no" id="noBtn">No 😡</button>
    </div>

    <audio id="song" src="song.mp3"></audio>
</div>

<script>
/* Smooth Canvas Hearts */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let hearts = [];

function Heart() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 20;
    this.size = Math.random() * 8 + 8;
    this.speed = Math.random() * 1 + 0.5;
    this.alpha = Math.random() * 0.5 + 0.5;
}

Heart.prototype.draw = function() {
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = "#ff4d6d";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.bezierCurveTo(this.x, this.y - this.size/2,
                      this.x - this.size, this.y - this.size/2,
                      this.x - this.size, this.y);
    ctx.bezierCurveTo(this.x - this.size, this.y + this.size/2,
                      this.x, this.y + this.size,
                      this.x, this.y + this.size);
    ctx.bezierCurveTo(this.x, this.y + this.size,
                      this.x + this.size, this.y + this.size/2,
                      this.x + this.size, this.y);
    ctx.bezierCurveTo(this.x + this.size, this.y - this.size/2,
                      this.x, this.y - this.size/2,
                      this.x, this.y);
    ctx.fill();
    ctx.globalAlpha = 1;
};

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (hearts.length < 40) hearts.push(new Heart());

    for (let i = 0; i < hearts.length; i++) {
        hearts[i].y -= hearts[i].speed;
        hearts[i].draw();

        if (hearts[i].y < -20) {
            hearts.splice(i, 1);
            i--;
        }
    }

    requestAnimationFrame(animate);
}
animate();

/* Escape No Button */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("touchstart", moveBtn);
noBtn.addEventListener("mouseover", moveBtn);

function moveBtn() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

/* Forgive Action */
function forgive() {
    alert("I love you Manisha ❤️🥺");
    const audio = document.getElementById("song");
    audio.play();

    document.body.style.background = "linear-gradient(135deg,#ff9a9e,#fad0c4)";

    
}
</script>

</body>
</html>
